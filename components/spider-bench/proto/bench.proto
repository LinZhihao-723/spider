syntax = "proto3";
package spider.bench;

service BenchScheduler {
  // Dequeue a ready task index for a worker.
  rpc GetReadyTask(GetReadyTaskRequest) returns (GetReadyTaskResponse);

  // Register a task instance, returning instance_id and serialized inputs.
  rpc RegisterTaskInstance(RegisterTaskInstanceRequest) returns (RegisterTaskInstanceResponse);

  // Submit task completion or failure, returning the resulting job state.
  rpc SubmitTaskResult(SubmitTaskResultRequest) returns (SubmitTaskResultResponse);
}

message GetReadyTaskRequest {
  // Worker identity — used to route to a per-worker queue.
  uint32 worker_id = 1;
}

message GetReadyTaskResponse {
  bool has_task = 1;
  uint64 task_index = 2;
}

message RegisterTaskInstanceRequest {
  uint64 task_index = 1;
}

message RegisterTaskInstanceResponse {
  uint64 task_instance_id = 1;
  // Serialized Vec<TaskInput> via rmp_serde.
  bytes inputs = 2;
}

message SubmitTaskResultRequest {
  uint64 task_instance_id = 1;
  uint64 task_index = 2;
  bool success = 3;
  // Serialized Vec<TaskOutput> via rmp_serde (valid when success == true).
  bytes outputs = 4;
  string error_message = 5;
}

message SubmitTaskResultResponse {
  JobState job_state = 1;
}

enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  JOB_STATE_RUNNING = 1;
  JOB_STATE_SUCCEEDED = 2;
  JOB_STATE_FAILED = 3;
  JOB_STATE_CANCELLED = 4;
  JOB_STATE_COMMIT_READY = 5;
  JOB_STATE_CLEANUP_READY = 6;
  JOB_STATE_READY = 7;
}
